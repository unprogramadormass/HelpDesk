<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Actualizar Contraseña | HelpDesk</title>
    <meta name="theme-color" content="#000000">
    <link rel="icon" href="/HelpDesk/assets/img/public/ICO.ico" type="image/x-icon">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* 
        =========================================
        RESETEO Y VARIABLES (TEMA AZUL)
        ========================================= 
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        :root {
            --primary-color: #2563eb;
            --primary-hover: #3b82f6;
            --glass-bg: rgba(15, 20, 30, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --bg-input: rgba(255, 255, 255, 0.05);
            --bg-input-focus: rgba(255, 255, 255, 0.1);
        }

        /* =========================================
           FONDO
           ========================================= */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
      
            background-image: url("/HelpDesk/assets/img/BAK-logo.png");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            position: relative;
        }

        /* Capa oscurecedora (si usas imagen de fondo) */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(4, 18, 36, 0.7) 100%);
            z-index: 0;
        }

        /* =========================================
           CONTENEDOR PRINCIPAL (GLASSMORPHISM)
           ========================================= */
        .form-container {
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Icono decorativo */
        .header-section i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }

        h2 {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* =========================================
           INPUTS GENERALES
           ========================================= */
        .input-group, .input-group-validar {
            position: relative;
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 14px 45px 14px 16px; /* Espacio derecho para el icono */
            background-color: var(--bg-input);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            background-color: var(--bg-input-focus);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
        }

        /* Estilo para inputs deshabilitados */
        input:disabled {
            background-color: rgba(0, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }

        /* Botón de ojito */
        .toggle-password, .toggle-password-s {
            position: absolute;
            right: 15px;
            bottom: 14px; /* Alinear con el padding del input */
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            transition: color 0.3s ease;
        }

        .toggle-password:hover, .toggle-password-s:hover {
            color: var(--text-main);
        }

        /* =========================================
           SECCIÓN DE VALIDACIÓN (FORM SUPERIOR)
           ========================================= */
        .form-validar-pass {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); /* Línea divisoria */
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        .input-wrapper .toggle-password-s {
            bottom: 14px;
        }

        /* Botones */
        button {
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:not(:disabled):hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        button:not(:disabled):active {
            transform: translateY(0);
        }

        button:disabled {
            background: rgba(37, 99, 235, 0.3);
            color: rgba(255, 255, 255, 0.5);
            cursor: not-allowed;
            box-shadow: none;
        }

        .btn-validar {
            padding: 0 20px;
            height: 48px; /* Igualar altura del input */
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        /* Botón Actualizar (Inferior) */
        .btn-actualizar {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

    </style>
</head>
<body>

    <div class="form-container">
        <div class="header-section">
            <i class='bx bx-shield-quarter'></i>
            <h2>Seguridad de la cuenta</h2>
            <p class="subtitle">Es necesario actualizar tu contraseña</p>
        </div>

        <form class="form-validar-pass">
            <div class="input-group-validar">
                <label for="actual">Contraseña Actual</label>
                <div class="input-row">
                    <div class="input-wrapper">
                        <input type="password" id="actual" required minlength="8" placeholder="Ingresa tu contraseña actual"/>
                        <i class='bx bx-show toggle-password-s' onclick="togglePassword(this)"></i>
                    </div>
                    <button class="btn-validar" type="submit">Validar</button>
                </div>
            </div>
        </form>

        <form>
            <div class="input-group">
                <label for="nueva">Nueva Contraseña</label>
                <input type="password" id="nueva" required disabled minlength="8" placeholder="Mínimo 8 caracteres"/>
                <i class='bx bx-show toggle-password' onclick="togglePassword(this)"></i>
            </div>

            <div class="input-group">
                <label for="confirmar">Confirmar Contraseña</label>
                <input type="password" id="confirmar" required disabled minlength="8" placeholder="Repite la nueva contraseña"/>
                <i class='bx bx-show toggle-password' onclick="togglePassword(this)"></i>
            </div>

            <button class="btn-actualizar" type="submit" disabled>Actualizar Contraseña</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/HelpDesk/assets/js/pass/validar_pass.js"></script>
    <script src="/HelpDesk/assets/js/pass/update_pass.js"></script>
    
    <script>
        function togglePassword(icon) {
            const input = icon.previousElementSibling;
            const isPassword = input.type === "password";
            input.type = isPassword ? "text" : "password";
            
            // Cambiamos entre el icono del ojo abierto y cerrado
            if (isPassword) {
                icon.classList.remove('bx-show');
                icon.classList.add('bx-hide');
            } else {
                icon.classList.remove('bx-hide');
                icon.classList.add('bx-show');
            }
        }
    </script>
</body>
</html>
